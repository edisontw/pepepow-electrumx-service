# Include these locations inside the light.pepepow.net TLS server block.
# Nginx serves the built pepepow-light-wallet files directly under /wallet/.

location = /wallet {
    return 301 /wallet/;
}

# Vite emits fingerprinted asset filenames. Cache them aggressively; a new
# build produces new filenames when contents change.
location ^~ /wallet/assets/ {
    alias /var/www/pepepow-light-wallet/assets/;
    try_files $uri =404;
    access_log /var/log/nginx/pepepow-wallet-access.log;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
}

# Public wallet files and SPA fallback. Keep index.html uncached so users
# pick up the latest asset manifest after each deployment.
location ^~ /wallet/ {
    alias /var/www/pepepow-light-wallet/;
    try_files $uri $uri/ /wallet/index.html;
    access_log /var/log/nginx/pepepow-wallet-access.log;
    add_header Cache-Control "no-cache";
}
